name: Release Keepsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Verify backend URL
        run: |
          raw_tag="${GITHUB_REF#refs/tags/}"
          normalized_tag="${raw_tag#v}"
          normalized_tag="v${normalized_tag//./-}"
          url="https://${normalized_tag}---keepsidianserver-i55qr5tvea-uc.a.run.app/subscribe"
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
          if [ "$status" != "200" ]; then
            echo "Backend URL not live: $url (status $status)"
            exit 1
          fi
          echo "Backend URL live: $url"

      - name: Build plugin
        run: |
          cutoff="$(python3 -c 'from datetime import datetime, timedelta, timezone; print((datetime.now(timezone.utc) - timedelta(days=14)).strftime("%Y-%m-%dT%H:%M:%SZ"))')"
          npm ci --before="$cutoff"
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
